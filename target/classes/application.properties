server.port=8080
spring.application.name=truck-planner

# ── Jackson ──────────────────────────────────────────────────────────────────
# Automatically converts Java camelCase field names to JSON snake_case keys
# (and back), eliminating the need for @JsonProperty on every DTO field.
# Examples: maxWeightLbs → max_weight_lbs, selectedOrderIds → selected_order_ids
spring.jackson.property-naming-strategy=SNAKE_CASE

# Serialize java.time.LocalDate as "2025-12-05" (not a numeric timestamp)
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Cache ─────────────────────────────────────────────────────────────────────
# Caffeine in-memory cache used by the legacy /api/v1/plans endpoints.
# The optimizer endpoint is stateless and recomputes on every call.
spring.cache.type=caffeine
spring.cache.cache-names=loadPlans
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=60m

# ── Actuator ──────────────────────────────────────────────────────────────────
# Health endpoint is polled by the Docker health-check defined in docker-compose.yml
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

logging.level.com.teleport=INFO
