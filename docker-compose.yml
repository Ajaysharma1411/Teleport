version: '3.9'

services:
  truck-planner:
    build: .
    ports:
      - "8080:8080"
    environment:
      - JAVA_TOOL_OPTIONS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped